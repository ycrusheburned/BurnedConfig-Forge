name: Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: gradle build --stacktrace 2>&1 | tee build_output.log

      - name: Report failure log
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          tail -c 60000 build_output.log > tail.log
          python3 .github/scripts/report_failure.py

      - name: Upload forge jar
        uses: actions/upload-artifact@v4
        with:
          name: BurnedConfig-Forge-jar
          path: forge/build/libs/*.jar
