name: Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Build
        run: gradle build --stacktrace 2>&1 | tee build_output.log

      - name: Report build report
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "=== find jars ===" > tail.log
          (find . -name "*.jar" -not -path "*/caches/*" -exec ls -la {} \; >> tail.log 2>&1) || true
          echo "=== repo root tree ===" >> tail.log
          (find . -maxdepth 2 -not -path "./.git*" >> tail.log 2>&1) || true
          echo "=== forge dir tree ===" >> tail.log
          (find forge -maxdepth 5 >> tail.log 2>&1) || true
          echo "=== log tail ===" >> tail.log
          tail -c 40000 build_output.log >> tail.log
          python3 .github/scripts/report_failure.py

      - name: Upload forge jar
        uses: actions/upload-artifact@v4
        with:
          name: BurnedConfig-Forge-jar
          path: forge/build/libs/BurnedConfig-forge-*-1.21.11.jar
          if-no-files-found: error

      - name: Publish jar as issue (base64)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/publish_jar.py
